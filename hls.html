<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple HLS Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body {
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
video {
    width:80%;
    max-width:900px;
}
</style>
</head>

<body>

<video id="video" controls></video>

<script>
const video = document.getElementById('video');
const videoSrc = "https://public-video-cdn.boops.org/0db8d9d4-280d-46c0-b739-7645e471a04b/0db8d9d4-280d-46c0-b739-7645e471a04b.m3u8";

if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native playback
    video.src = videoSrc;
} else if (Hls.isSupported()) {
    // Other browsers use hls.js
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
}

</script>

</body>
</html>
